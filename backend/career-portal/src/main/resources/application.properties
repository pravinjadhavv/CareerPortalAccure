spring.application.name=career-portal

server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/career_portal?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# file upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

app.jwt.secret=4938472948729348723948729348723948729348723948765678904321
app.jwt.expiration-minutes=240
app.upload.dir=uploads

# QA/demo seed data (set true to insert 3 companies, 2 candidates, 5 jobs)
app.demo.seed=true 

